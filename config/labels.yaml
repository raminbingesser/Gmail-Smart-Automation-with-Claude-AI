# Label-Konfiguration für Email-Klassifikation
# Nutzt Gmail Custom Labels mit EmailAuto_ Präfix

labels:
  - name: EmailAuto_Newsletter
    description: "Marketing, Subscriptions, Digests, Periodische Updates"
    keywords: ["newsletter", "subscription", "unsubscribe", "digest", "weekly", "monthly", "abo", "subscribe", "alert", "beachten"]

  - name: EmailAuto_Invoice
    description: "Rechnungen, Payments, Transaktionen, Quittungen"
    keywords: ["invoice", "payment", "rechnung", "quittung", "receipt", "transaction", "betrag", "bestellung", "auftrag", "order", "versand", "shipping", "chf", "€", "rechnungsno", "auftragsno"]

  - name: EmailAuto_Work
    description: "Geschäftliche Emails, Meetings, Projekte, Team-Kommunikation"
    keywords: ["meeting", "project", "deadline", "team", "business", "arbeit", "besprechung", "anfrage", "ticket", "case", "support", "angebot"]

  - name: EmailAuto_Steuern
    description: "Steuererklärung, Steuerbescheinigung, AHV, IV, BVG, Vorsorge, Lohnausweis"
    keywords: ["steuern", "tax", "steuerbescheinigung", "lohnausweis", "ahv", "iv", "bvg", "vorsorge", "einkommensteuererklärung", "dekl", "eis"]
