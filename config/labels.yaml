# Label-Konfiguration für Email-Klassifikation
# Nutzt Gmail System-Labels + Custom Labels mit Underscores

labels:
  - name: IMPORTANT
    description: "Dringende/wichtige Emails, Action Required, Zeitkritisch"
    keywords: ["urgent", "asap", "wichtig", "action required", "dringend"]

  - name: EmailAuto_Newsletter
    description: "Marketing, Subscriptions, Digests, Periodische Updates"
    keywords: ["newsletter", "subscription", "unsubscribe", "digest", "weekly", "monthly"]

  - name: EmailAuto_Invoice
    description: "Rechnungen, Payments, Transaktionen, Quittungen"
    keywords: ["invoice", "payment", "rechnung", "quittung", "receipt", "transaction", "betrag"]

  - name: EmailAuto_Work
    description: "Geschäftliche Emails, Meetings, Projekte, Team-Kommunikation"
    keywords: ["meeting", "project", "deadline", "team", "business", "arbeit", "besprechung"]

  - name: SPAM
    description: "Spam, Junk, Unerwünschte Emails"
    keywords: ["spam", "unsubscribe", "viagra", "lottery", "nigerian prince"]

  - name: CATEGORY_PERSONAL
    description: "Private Emails, Friends, Familie, Persönliche Nachrichten"
    keywords: ["friend", "family", "personal", "love", "hope you", "freund", "familie"]
