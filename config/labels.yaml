# Label-Konfiguration für Email-Klassifikation
# Nutzt Gmail System-Labels + Custom Labels mit Underscores

labels:
  - name: IMPORTANT
    description: "Dringende/wichtige Emails"

  - name: EmailAuto_Newsletter
    description: "Marketing, Subscriptions, Digests"

  - name: EmailAuto_Invoice
    description: "Invoices, Payments, Transaktionen"

  - name: EmailAuto_Work
    description: "Work-related Emails"

  - name: SPAM
    description: "Potentiell Spam/Junk"

  - name: CATEGORY_PERSONAL
    description: "Friends, Familie, Soziales"
